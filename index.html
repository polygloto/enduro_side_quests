<html lang="ru">
<head>
<meta charset="UTF-8">

<title>ENDURO · Mobility Protocol</title>

<meta name="theme-color" content="#0d0d0d">

<meta property="og:description" content="Daily lower-body mobility protocol for enduro riders. One set, every day, 4-6 weeks.">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0d0d;
    --bg-card: #161616;
    --bg-elev: #1f1f1f;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #888;
    --text-muted: #555;
    --accent: #ff4500;
    --accent-dim: #8a2500;
    --done: #4ade80;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(255,69,0,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(255,69,0,0.05) 0%, transparent 50%);
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  header {
    border-bottom: 2px solid var(--accent);
    padding-bottom: 20px;
    margin-bottom: 24px;
  }

  .lang-switch {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 16px;
  }

  .lang-switch-inner {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
  }

  .lang-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 6px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .lang-btn.active {
    background: var(--accent);
    color: #000;
  }

  .lang-btn:not(.active):hover { color: var(--text); }

  .brand {
    font-family: 'Archivo Black', sans-serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--accent);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(32px, 8vw, 48px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 12px;
    letter-spacing: 0.05em;
  }

  .meta {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    flex-wrap: wrap;
  }

  .meta span { display: flex; align-items: center; gap: 6px; }
  .meta b { color: var(--text); font-weight: 500; }

  .intro {
    background: var(--bg-card);
    border-left: 3px solid var(--accent);
    padding: 16px 18px;
    margin: 24px 0;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-dim);
  }

  .intro b { color: var(--text); }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 24px 0;
  }

  .stat {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 14px 10px;
    text-align: center;
  }

  .stat-val {
    font-family: 'Archivo Black', sans-serif;
    font-size: 24px;
    color: var(--accent);
  }

  .stat-label {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .section-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text);
    margin: 32px 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::before {
    content: '';
    width: 20px;
    height: 2px;
    background: var(--accent);
  }

  .exercise {
    background: var(--bg-card);
    border: 1px solid var(--border);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .exercise.done {
    border-color: var(--done);
    opacity: 0.6;
  }

  .exercise-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .ex-num {
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    color: var(--accent);
    min-width: 32px;
  }

  .exercise.done .ex-num { color: var(--done); }

  .ex-info { flex: 1; min-width: 0; }

  .ex-name {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 2px;
    letter-spacing: -0.01em;
  }

  .ex-dose {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .ex-toggle {
    font-size: 18px;
    color: var(--text-muted);
    transition: transform 0.2s;
    padding: 4px 8px;
  }

  .exercise.open .ex-toggle { transform: rotate(180deg); }

  .ex-body {
    display: none;
    padding: 0 16px 18px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }

  .exercise.open .ex-body { display: block; }

  .ex-section { margin-bottom: 14px; }

  .ex-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 700;
  }

  .ex-text {
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
  }

  .ex-warn {
    font-size: 12px;
    color: var(--text-dim);
    padding: 8px 12px;
    background: var(--bg-elev);
    border-left: 2px solid var(--accent-dim);
    line-height: 1.5;
  }

  .ex-controls {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
    min-width: 120px;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
  .btn.primary:hover { background: #ff5a1f; color: #000; }

  /* Timer overlay */
  .timer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 100;
    padding: 20px 16px;
    overflow-y: auto;
  }

  .timer-overlay.active { display: flex; }

  .timer-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: center;
  }

  .timer-exercise {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(18px, 5vw, 24px);
    margin-bottom: 24px;
    text-align: center;
    letter-spacing: -0.01em;
    max-width: 90%;
  }

  .timer-display {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(96px, 28vw, 180px);
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
    font-variant-numeric: tabular-nums;
  }

  .timer-side {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 24px;
    min-height: 18px;
  }

  .timer-progress {
    width: 100%;
    max-width: 400px;
    height: 4px;
    background: var(--bg-elev);
    margin-bottom: 32px;
    overflow: hidden;
  }

  .timer-bar {
    height: 100%;
    background: var(--accent);
    width: 100%;
    transition: width 1s linear;
  }

  .timer-controls {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 400px;
  }

  .timer-controls .btn {
    min-width: 0;
    padding: 12px 4px;
    font-size: 10px;
    letter-spacing: 0.08em;
  }

  .timer-progress-info {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 20px;
    text-align: center;
  }

  .reset-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 32px 0 16px;
    padding: 14px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
  }

  .progress-count {
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px;
  }

  .progress-count span { color: var(--accent); }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .reset-btn:hover { color: var(--accent); border-color: var(--accent); }

  footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 1.8;
  }

  .tip-block {
    background: linear-gradient(135deg, rgba(255,69,0,0.08), transparent);
    border: 1px solid var(--border);
    padding: 18px;
    margin: 24px 0;
  }

  .tip-block h3 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .tip-block ul { list-style: none; }

  .tip-block li {
    font-size: 12px;
    line-height: 1.7;
    color: var(--text-dim);
    padding-left: 16px;
    position: relative;
  }

  .tip-block li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }

  .tip-block li b { color: var(--text); }
</style>
</head>

<header>
  <div class="lang-switch">
    <div class="lang-switch-inner" id="langSwitch">

      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </div>
  <div class="brand" id="t-brand">◉ DAILY MOBILITY PROTOCOL</div>
  <h1 id="t-title">Enduro<br>Lower Body</h1>
  <div class="subtitle" id="t-subtitle"></div>
  <div class="meta" id="t-meta"></div>
</header>

<div class="intro" id="t-intro"></div>
<div class="stats" id="t-stats"></div>

<div class="reset-bar">
  <div class="progress-count"><span id="doneCount">0</span> / <span id="totalCount">0</span></div>
  <button class="reset-btn" id="resetBtn">↻ Reset</button>
</div>

<div class="section-title" id="t-section"></div>

<div id="exerciseList"></div>

  <div class="timer-progress"><div class="timer-bar" id="timerBar"></div></div>
  <div class="timer-controls">
    <button class="btn" id="pauseBtn">Pause</button>
    <button class="btn" id="skipBtn">Skip</button>
    <button class="btn primary" id="stopBtn">Stop</button>
  </div>
  <div class="timer-progress-info" id="roundInfo">—</div>
</div>

const STORAGE = { done: 'enduro:done', lang: 'enduro:lang' };

let currentLang = 'ru';
const doneSet = new Set();
const openSet = new Set();
const timerState = {
  active: false, paused: false, exerciseIdx: 0,
  currentSide: 0, currentRound: 0, totalRounds: 2,
  timeLeft: 0, totalTime: 0, interval: null
};

function loadState() {
  try {
    const lang = localStorage.getItem(STORAGE.lang);
    if (lang === 'ru' || lang === 'en') currentLang = lang;
    const done = JSON.parse(localStorage.getItem(STORAGE.done) || '[]');
    if (Array.isArray(done)) done.forEach(i => {
      if (Number.isInteger(i) && i >= 0 && i < exercises.length) doneSet.add(i);
    });
  } catch (e) {}
}

function saveDone() {
  try { localStorage.setItem(STORAGE.done, JSON.stringify([...doneSet])); } catch (e) {}
}

function saveLang() {
  try { localStorage.setItem(STORAGE.lang, currentLang); } catch (e) {}
}

function formatDose(ex, lang) {
  const t = i18n[lang];
  const each = ex.sides === 2 ? t.dose_each : '';
  return `${ex.sets} × ${ex.duration} ${t.dose_unit}${each}`;
}

function setLang(lang) {
  currentLang = lang;
  saveLang();
  renderAll();
}

function renderAll() {
  const t = i18n[currentLang];
  document.documentElement.lang = currentLang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === currentLang);
  });
  document.getElementById('t-brand').textContent = t.brand;
  document.getElementById('t-title').innerHTML = t.title;
  document.getElementById('t-subtitle').textContent = t.subtitle;

  document.getElementById('t-meta').innerHTML = `
    <span><b>25</b> ${t.meta_min}</span>
    <span><b>${exercises.length}</b> ${t.meta_ex}</span>
    <span><b>${t.meta_mode_val}</b> ${t.meta_mode_label}</span>
  `;

  document.getElementById('t-intro').innerHTML = t.intro;

  document.getElementById('t-stats').innerHTML = `
    <div class="stat"><div class="stat-val">3-5</div><div class="stat-label">${t.stat_warmup}</div></div>
    <div class="stat"><div class="stat-val">30-45</div><div class="stat-label">${t.stat_hold}</div></div>
    <div class="stat"><div class="stat-val">2</div><div class="stat-label">${t.stat_sets}</div></div>
  `;

  document.getElementById('resetBtn').textContent = t.reset;
  document.getElementById('t-section').textContent = t.section;
  document.getElementById('totalCount').textContent = exercises.length;

  document.getElementById('t-principles').innerHTML = `
    <h3>${t.principles_title}</h3>
    <ul>${t.principles.map(p => `<li>${p}</li>`).join('')}</ul>
  `;
  document.getElementById('t-enduro').innerHTML = `
    <h3>${t.enduro_title}</h3>
    <ul>${t.enduro.map(p => `<li>${p}</li>`).join('')}</ul>
  `;
  document.getElementById('t-footer').innerHTML = t.footer;

  document.getElementById('t-timer-label').textContent = t.timer_label;
  document.getElementById('pauseBtn').textContent = timerState.paused ? t.resume : t.pause;
  document.getElementById('skipBtn').textContent = t.skip;
  document.getElementById('stopBtn').textContent = t.stop;

  renderExercises();
  if (timerState.active) updateTimerDisplay();
}

function renderExercises() {
  const t = i18n[currentLang];
  const list = document.getElementById('exerciseList');
  list.innerHTML = exercises.map((ex, i) => {
    const exT = ex[currentLang];
    return `
    <div class="exercise ${doneSet.has(i) ? 'done' : ''} ${openSet.has(i) ? 'open' : ''}" id="ex-${i}">
      <div class="exercise-header" data-action="toggle" data-idx="${i}">
        <div class="ex-num">${String(i+1).padStart(2,'0')}</div>
        <div class="ex-info">
          <div class="ex-name">${exT.name}</div>
          <div class="ex-dose">${formatDose(ex, currentLang)}</div>
        </div>
        <div class="ex-toggle">▾</div>
      </div>
      <div class="ex-body">
        <div class="ex-section">
          <div class="ex-label">${t.ex_technique}</div>
          <div class="ex-text">${exT.technique}</div>
        </div>
        <div class="ex-section">
          <div class="ex-label">${t.ex_tip}</div>
          <div class="ex-warn">${exT.tip}</div>
        </div>
        <div class="ex-controls">
          <button class="btn primary" data-action="start" data-idx="${i}">${t.ex_start}</button>
          <button class="btn" data-action="mark" data-idx="${i}">${doneSet.has(i) ? t.ex_done : t.ex_mark}</button>
        </div>
      </div>
    </div>
    `;
  }).join('');
}

function toggleExercise(i) {
  if (openSet.has(i)) openSet.delete(i);
  else openSet.add(i);
  renderExercises();
}

function toggleDone(i) {
  if (doneSet.has(i)) doneSet.delete(i);
  else doneSet.add(i);
  saveDone();
  updateDoneCount();
  renderExercises();
}

function updateDoneCount() {
  document.getElementById('doneCount').textContent = doneSet.size;
}

function resetProgress() {
  doneSet.clear();
  saveDone();
  updateDoneCount();
  renderExercises();
}

function startTimer(idx) {
  const ex = exercises[idx];
  timerState.active = true;
  timerState.paused = false;
  timerState.exerciseIdx = idx;
  timerState.currentSide = 0;
  timerState.currentRound = 0;
  timerState.totalRounds = ex.sets;
  timerState.totalTime = ex.duration;
  timerState.timeLeft = ex.duration;
  document.getElementById('timerOverlay').classList.add('active');
  updateTimerDisplay();
  runTick();
}

function runTick() {
  if (timerState.interval) clearInterval(timerState.interval);
  timerState.interval = setInterval(() => {
    if (timerState.paused) return;
    timerState.timeLeft--;
    updateTimerDisplay();
    if (timerState.timeLeft <= 0) {
      beep();
      advance();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const t = i18n[currentLang];
  const ex = exercises[timerState.exerciseIdx];
  const exT = ex[currentLang];

  document.getElementById('timerExName').textContent = exT.name;
  document.getElementById('timerDisplay').textContent = String(timerState.timeLeft).padStart(2, '0');
  const pct = (timerState.timeLeft / timerState.totalTime) * 100;
  document.getElementById('timerBar').style.width = pct + '%';

  const sideText = ex.sides === 2
    ? (timerState.currentSide === 0 ? t.timer_left : t.timer_right)
    : '';
  document.getElementById('timerSide').textContent = sideText;

  const totalSets = ex.sides * timerState.totalRounds;
  const currentSet = timerState.currentRound * ex.sides + timerState.currentSide + 1;
  document.getElementById('roundInfo').textContent = t.timer_set(currentSet, totalSets);
}

function advance() {
  const ex = exercises[timerState.exerciseIdx];
  timerState.currentSide++;
  if (timerState.currentSide >= ex.sides) {
    timerState.currentSide = 0;
    timerState.currentRound++;
  }
  if (timerState.currentRound >= timerState.totalRounds) {
    doneSet.add(timerState.exerciseIdx);
    saveDone();
    updateDoneCount();
    renderExercises();
    closeTimer();
    return;
  }
  timerState.timeLeft = timerState.totalTime;
  updateTimerDisplay();
}

function skipRound() {
  timerState.timeLeft = 0;
  advance();
}

function togglePause() {
  timerState.paused = !timerState.paused;
  const t = i18n[currentLang];
  document.getElementById('pauseBtn').textContent = timerState.paused ? t.resume : t.pause;
}

function closeTimer() {
  timerState.active = false;
  if (timerState.interval) clearInterval(timerState.interval);
  document.getElementById('timerOverlay').classList.remove('active');
  const t = i18n[currentLang];
  document.getElementById('pauseBtn').textContent = t.pause;
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start();
    osc.stop(ctx.currentTime + 0.3);
  } catch (e) {}
}

document.getElementById('exerciseList').addEventListener('click', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const idx = Number(target.dataset.idx);
  switch (target.dataset.action) {
    case 'toggle': toggleExercise(idx); break;
    case 'start': startTimer(idx); break;
    case 'mark': toggleDone(idx); break;
  }
});

document.getElementById('langSwitch').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-lang]');
  if (btn) setLang(btn.dataset.lang);
});

document.getElementById('resetBtn').addEventListener('click', resetProgress);
document.getElementById('pauseBtn').addEventListener('click', togglePause);
document.getElementById('skipBtn').addEventListener('click', skipRound);
document.getElementById('stopBtn').addEventListener('click', closeTimer);

loadState();
updateDoneCount();
renderAll();
</script>
</body>
